<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="style.css">
     <script src="inm.js">java</script>
</head>

<body>
    <header class="home"><!--header-->
        <div class="contain"><!--الحاوية لمحتويات الهيدر-->

            <div class="logo"><!--الشعار صورة-->
                <img src="main picture/OCT4.png" alt="logo" height="64" width="81">

            </div>
            <div class="name_my_web">
                <h1 class="name_my_web_logo">oct game</h1>
            </div><!--الشعار الاسم-->

            <div class="nav_bar">
                <a href="index.html" class="llink">main page</a><!-- اضافة رابطhtmlمحتويات القائمة-->
              
            </div>
        </div>
    </header>


    <section class="login_contain">

        <div class="logo_login"><!--logo pic-->
            <img src="main picture/user-٣.png" height="130">
        </div>

        <div class="title_login">
            <h1>Login</h1><!--login-->
        </div>

        <div>
            <form class="form_login">
                <label for="email" class="u_email"><img src="main picture/email.png" height="17px" class="imgicon" >email address</label><!--user name-->
                <input type="email" required id="email" class="input_u_email" placeholder="@gmail.com">
                <br>
                <label for="pass" class="p_name"><img src="main picture/padlock.png"  height="17" class="imgicon">password</label><!--password-->
                <input type="password" id="pass" required class="input_p_name" placeholder="password">
                <br>
                <button type="submit" value="login" class="login_button">login</button>
                <input type="checkbox" id="tt" class="tt"><label for="tt" class="checkbox">remmember password</label>
            </form>
        </div>
    </section>
</body>

</html>
